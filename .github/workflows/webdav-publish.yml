name: "Publish to WebDAV"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Get git tag
        id: get_tag
        run: |
          # Check if this is a tag push
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "is_tag_push=true" >> $GITHUB_OUTPUT
          else
            # Try to get the latest tag from the current commit
            TAG=$(git describe --tags --exact-match 2>/dev/null || git describe --tags 2>/dev/null || echo "")
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "is_tag_push=false" >> $GITHUB_OUTPUT
          fi
          echo "Tag found: ${{ steps.get_tag.outputs.tag }}"

      - name: Update version with build time and tag
        id: version
        run: |
          # Get current timestamp in format YYYYMMDDHHmm
          TIMESTAMP=$(date -u +'%Y%m%d%H%M')
          echo "Current timestamp: $TIMESTAMP"
          
          # Get tag info
          TAG="${{ steps.get_tag.outputs.tag }}"
          IS_TAG="${{ steps.get_tag.outputs.is_tag_push }}"
          
          # Determine version suffix
          if [ "$IS_TAG" = "true" ] && [ -n "$TAG" ]; then
            # If this is a tag push, use the tag as version with timestamp
            VERSION="${TAG}-${TIMESTAMP}"
          elif [ -n "$TAG" ]; then
            # If there's a tag, include it with timestamp
            # Remove 'v' prefix if present
            TAG_CLEAN=${TAG#v}
            VERSION="${TAG_CLEAN}-${TIMESTAMP}"
          else
            # No tag, just use timestamp
            VERSION="${TIMESTAMP}"
          fi
          
          echo "New version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Update version in package.json for webapp
          cd packages/webapp
          echo "Current version in package.json:"
          grep '"version"' package.json
          
          # Use node to update package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          
          echo "Updated version in package.json:"
          grep '"version"' package.json

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build the project
        run: pnpm build

      - name: Package the project
        run: pnpm package

      - name: Upload to WebDAV
        uses: weijia/action-upload-webdav@master
        with:
          webdav-url: ${{ secrets.WEBDAV_URL }}
          webdav-username: ${{ secrets.WEBDAV_USERNAME }}
          webdav-password: ${{ secrets.WEBDAV_PASSWORD }}
          webdav-root: online/utags
          source-directory: ./packages/webapp/dist
